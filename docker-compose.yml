version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # Backend FastAPI
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: devops-monitor-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - API_KEY=${API_KEY}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()",
        ]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - monitor-network

  # ---------------------------------------------------------------------------
  # Frontend Streamlit
  # ---------------------------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: devops-monitor-dashboard
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://api:8000
      - API_KEY=${API_KEY}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - monitor-network

networks:
  monitor-network:
    driver: bridge
