# =============================================================================
# DevOps Monitor — Pipeline CI/CD
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  API_IMAGE: devops-monitor-api
  DASHBOARD_IMAGE: devops-monitor-dashboard

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — Test
  # ---------------------------------------------------------------------------
  test:
    name: 🧪 Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 api/ dashboard/ tests/ --max-line-length=88

      - name: Run tests with coverage
        env:
          API_KEY: test-secret-key
        run: |
          pytest tests/ -v \
            --cov=api \
            --cov-report=term-missing \
            --cov-fail-under=75

  # ---------------------------------------------------------------------------
  # Job 2 — Build & Push Docker Hub
  # ---------------------------------------------------------------------------
  build:
    name: 🐳 Build & Push to Docker Hub
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        run: |
          IMAGE_TAG="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.API_IMAGE }}:${{ github.sha }}"
          IMAGE_LATEST="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.API_IMAGE }}:latest"
          docker build -f api/Dockerfile -t "$IMAGE_TAG" -t "$IMAGE_LATEST" .
          docker push "$IMAGE_TAG"
          docker push "$IMAGE_LATEST"

      - name: Build and push Dashboard image
        run: |
          IMAGE_TAG="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DASHBOARD_IMAGE }}:${{ github.sha }}"
          IMAGE_LATEST="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DASHBOARD_IMAGE }}:latest"
          docker build -f dashboard/Dockerfile -t "$IMAGE_TAG" -t "$IMAGE_LATEST" .
          docker push "$IMAGE_TAG"
          docker push "$IMAGE_LATEST"

  # ---------------------------------------------------------------------------
  # Job 3 — Deploy Azure via Publish Profile
  # ---------------------------------------------------------------------------
  deploy:
    name: 🚀 Deploy to Azure Web Apps
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy API → Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_API_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_API_PUBLISH_PROFILE }}
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.API_IMAGE }}:${{ github.sha }}

      - name: Deploy Dashboard → Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_DASHBOARD_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_DASHBOARD_PUBLISH_PROFILE }}
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DASHBOARD_IMAGE }}:${{ github.sha }}

      - name: ✅ Summary
        run: |
          echo "✅ Deployed successfully"
          echo "🌐 API       : https://${{ secrets.AZURE_WEBAPP_API_NAME }}.azurewebsites.net"
          echo "🌐 Dashboard : https://${{ secrets.AZURE_WEBAPP_DASHBOARD_NAME }}.azurewebsites.net"
