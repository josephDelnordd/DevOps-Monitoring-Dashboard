# =============================================================================
# DevOps Monitor — Pipeline CI/CD
# Jobs : test → build → deploy
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ${{ secrets.ACR_NAME }}.azurecr.io
  API_IMAGE: devops-monitor-api
  DASHBOARD_IMAGE: devops-monitor-dashboard

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — Test : lint + tests unitaires (tous les pushs et PRs)
  # ---------------------------------------------------------------------------
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 api/ dashboard/ tests/ --max-line-length=88

      - name: Run tests with coverage
        env:
          API_KEY: test-secret-key
        run: |
          pytest tests/ -v \
            --cov=api \
            --cov-report=term-missing \
            --cov-fail-under=75

  # ---------------------------------------------------------------------------
  # Job 2 — Build : construit et pousse les images vers ACR (main only)
  # ---------------------------------------------------------------------------
  build:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_NAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push API image
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.API_IMAGE }}:${{ github.sha }}"
          IMAGE_LATEST="${{ env.REGISTRY }}/${{ env.API_IMAGE }}:latest"
          docker build -f api/Dockerfile -t "$IMAGE_TAG" -t "$IMAGE_LATEST" .
          docker push "$IMAGE_TAG"
          docker push "$IMAGE_LATEST"

      - name: Build and push Dashboard image
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.DASHBOARD_IMAGE }}:${{ github.sha }}"
          IMAGE_LATEST="${{ env.REGISTRY }}/${{ env.DASHBOARD_IMAGE }}:latest"
          docker build -f dashboard/Dockerfile -t "$IMAGE_TAG" -t "$IMAGE_LATEST" .
          docker push "$IMAGE_TAG"
          docker push "$IMAGE_LATEST"

  # ---------------------------------------------------------------------------
  # Job 3 — Deploy : met à jour les Azure Container Apps (main only)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Deploy API to Container Apps
        run: |
          az containerapp update \
            --name devops-monitor-api \
            --resource-group devops-monitor-rg \
            --image "${{ env.REGISTRY }}/${{ env.API_IMAGE }}:${{ github.sha }}" \
            --set-env-vars "API_KEY=${{ secrets.API_KEY }}"

      - name: Deploy Dashboard to Container Apps
        run: |
          az containerapp update \
            --name devops-monitor-dashboard \
            --resource-group devops-monitor-rg \
            --image "${{ env.REGISTRY }}/${{ env.DASHBOARD_IMAGE }}:${{ github.sha }}" \
            --set-env-vars \
              "API_KEY=${{ secrets.API_KEY }}" \
              "API_BASE_URL=https://devops-monitor-api.<env>.azurecontainerapps.io"

      - name: Verify deployment
        run: |
          echo "✅ Deployment triggered successfully"
          echo "API SHA: ${{ github.sha }}"
